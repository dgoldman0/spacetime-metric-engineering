run_name: v5_service_identity_synthesis

service:
  velocity: 5.0
  carrying_flow:
    enabled: true
    law: identity
    scope: global

inputs:
  exact_fields: ../data/sample_v5/exact_builder_adm_v5/adm_exact_fields_V5p0.npz
  exact_point_ledger: ../data/sample_v5/exact_builder_adm_v5/adm_exact_point_ledger_v5_v10.csv
  substrate_fields: ../data/sample_v5/substrate_subtraction_fields_v5.npz

substrate:
  mode: carrying_flow_off

synthesis:
  enabled: true

validation:
  identity_self_check: true
  identity_tolerance: 1.0e-10

outputs:
  root: ../runs
  format: csv
  figures: false
  report: true
  overwrite: true
