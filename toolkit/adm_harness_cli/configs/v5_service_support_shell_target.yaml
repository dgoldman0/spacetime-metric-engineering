run_name: v5_support_shell_window_pos_target

service:
  velocity: 5.0

  carrying_flow:
    enabled: true
    law: windowed_adjustment
    scope: catch_rematch_support_shell
    allocation_mode: support_shell
    signal: delta_j_l
    amplitude: 0.0000001
    gain: 1.0
    max_abs_change: 0.0000001
    smoothness_order: 1
    packet_exclusion: 1.0
    support_shell_gain: 0.0
    edge_bias: 0.0
    target_service_field: carrying_flow
    catch_lead: 1.0
    temporal_width: 0.35

  clock_lapse:
    enabled: false
    law: windowed_scale
    scope: support_shell
    amplitude: 0.0
    max_abs_change: 0.0

  rail_stretch:
    enabled: false
    law: windowed_scale
    scope: support_shell
    amplitude: 0.0
    max_abs_change: 0.0

  throat_capacity:
    enabled: false
    law: windowed_scale
    scope: support_shell
    amplitude: 0.0
    max_abs_change: 0.0

inputs:
  exact_fields: ../data/sample_v5/exact_builder_adm_v5/adm_exact_fields_V5p0.npz
  exact_point_ledger: ../data/sample_v5/exact_builder_adm_v5/adm_exact_point_ledger_v5_v10.csv
  substrate_fields: ../data/sample_v5/substrate_subtraction_fields_v5.npz

substrate:
  mode: carrying_flow_off

synthesis:
  enabled: true

validation:
  identity_self_check: true
  identity_tolerance: 1.0e-10

thresholds:
  max_abs_delta_rho_packet: 0.000001
  max_abs_delta_j_packet: 0.0001
  min_catch_rematch_localization_fraction: 0.50

outputs:
  root: ../runs
  format: csv
  figures: false
  report: true
  overwrite: true
