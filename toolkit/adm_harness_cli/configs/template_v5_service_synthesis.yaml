run_name: v5_service_experiment

service:
  velocity: 5.0

  carrying_flow:
    enabled: true
    law: compact_momentum_localizer
    scope: catch_rematch_edge_support_mix
    allocation_mode: edge_support_mix
    signal: delta_j_l
    amplitude: 0.002
    gain: 1.0
    max_abs_change: 0.002
    smoothness_order: 2
    packet_exclusion: 0.40
    support_shell_gain: 0.50
    edge_bias: 0.25
    radial_center: null
    radial_width: null
    schedule_center: null
    schedule_width: null
    stage_weights:
      catch_rematch: 1.0

  clock_lapse:
    enabled: false
    law: windowed_scale
    scope: support_shell
    amplitude: 0.0
    max_abs_change: 0.0

  rail_stretch:
    enabled: false
    law: windowed_scale
    scope: support_shell
    amplitude: 0.0
    max_abs_change: 0.0

  throat_capacity:
    enabled: false
    law: windowed_scale
    scope: support_shell
    amplitude: 0.0
    max_abs_change: 0.0

inputs:
  exact_fields: ../data/sample_v5/exact_builder_adm_v5/adm_exact_fields_V5p0.npz
  exact_point_ledger: ../data/sample_v5/exact_builder_adm_v5/adm_exact_point_ledger_v5_v10.csv
  substrate_fields: ../data/sample_v5/substrate_subtraction_fields_v5.npz

substrate:
  mode: carrying_flow_off

synthesis:
  enabled: true

validation:
  identity_self_check: true
  identity_tolerance: 1.0e-10

thresholds:
  max_abs_delta_rho_packet: 0.000001
  max_abs_delta_j_packet: 0.0001
  min_catch_rematch_localization_fraction: 0.50

outputs:
  root: ../runs
  format: csv
  figures: false
  report: true
  overwrite: true
