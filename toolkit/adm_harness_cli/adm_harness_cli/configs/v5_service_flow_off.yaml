run_name: v5_service_flow_off

service:
  velocity: 5.0

inputs:
  exact_fields: /mnt/data/adm_harness_v03_data/exact_builder_adm_v5/adm_exact_fields_V5p0.npz
  exact_point_ledger: /mnt/data/adm_harness_v03_data/exact_builder_adm_v5/adm_exact_point_ledger_v5_v10.csv
  substrate_fields: /mnt/data/adm_harness_v03_data/substrate_subtraction_fields_v5.npz

substrate:
  mode: carrying_flow_off

absorber:
  mode: none

thresholds:
  max_abs_delta_rho_packet: 0.000001
  max_abs_delta_j_packet: 0.0001
  min_catch_rematch_localization_fraction: 0.50

outputs:
  root: /mnt/data/adm_harness_service_runs
  format: csv
  figures: false
  report: true
  overwrite: true
